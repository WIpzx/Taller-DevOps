# ============================================================
# Análisis SonarQube — Backend / API
# El host y el token NO van aquí (se pasan por línea de comandos / Jenkins):
#   sonar-scanner -Dsonar.host.url=... -Dsonar.token=...
# ============================================================
sonar.projectKey=taller_devops_api
sonar.projectName=Taller DevOps - API
sonar.projectVersion=1.0

# Código fuente y tests
sonar.sources=app,server.js
sonar.tests=app
sonar.test.inclusions=**/*.test.js

# Exclusiones de análisis
sonar.exclusions=node_modules/**,coverage/**,**/*.test.js

# Cobertura (lcov generado por jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Excluir del CÁLCULO de cobertura el bootstrap/config/rutas (no son lógica testeable):
sonar.coverage.exclusions=server.js,app/models/index.js,app/config/**,app/routes/**

sonar.sourceEncoding=UTF-8

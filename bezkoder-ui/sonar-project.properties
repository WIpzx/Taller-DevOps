# ============================================================
# Análisis SonarQube — Frontend / React
# El host y el token NO van aquí (se pasan por línea de comandos / Jenkins):
#   sonar-scanner -Dsonar.host.url=... -Dsonar.token=...
# ============================================================
sonar.projectKey=taller_devops_frontend
sonar.projectName=Taller DevOps - Frontend
sonar.projectVersion=1.0

# Código fuente y tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# Exclusiones de análisis (artefactos generados y boilerplate de CRA)
sonar.exclusions=node_modules/**,build/**,coverage/**,**/*.test.js,src/serviceWorker.js,src/setupTests.js,src/logo.svg

# Cobertura (lcov generado por react-scripts test --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Cobertura medida solo sobre la lógica testeable (capa de servicios).
# Se excluye el wrapper de configuración http-common.js y el boilerplate de CRA.
sonar.coverage.exclusions=src/index.js,src/serviceWorker.js,src/setupTests.js,src/App.js,src/http-common.js,src/components/**

sonar.sourceEncoding=UTF-8
